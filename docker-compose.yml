version: '3.8'

services:
  # Base de Datos
  db:
    image: mysql:8.0
    container_name: ministock-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${DB_NAME:-ministock_db}
      - MYSQL_USER=${DB_USER:-user_ministock}
      - MYSQL_PASSWORD=${DB_PASSWORD:-password_ministock}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ministock-network
  #frontend
  frontend:
    build: 
      context: ./Frontend
      args:
        - VITE_API_URL=http://${SERVER_IP:-localhost}:${BACKEND_PORT:-3000}/api/productos
    container_name: ministock-frontend
    networks:
      - ministock-network
    
  # Backend
  backend:
    build: ./Backend  # Docker buscará el Dockerfile aquí
    container_name: ministock-backend
    restart: always
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_USER=${DB_USER:-user_ministock}
      - DB_PASSWORD=${DB_PASSWORD:-password_ministock}
      - DB_NAME=${DB_NAME:-ministock_db}
      - PORT=${BACKEND_PORT:-3000}
    depends_on:
      - db
    networks:
      - ministock-network
      
  proxy:
    build: ./nginx
    container_name: ministock-proxy
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    environment:
      - SERVER_IP=${SERVER_IP}
    networks:
      - ministock-network

networks:
  ministock-network:
    driver: bridge

volumes:
  db_data: